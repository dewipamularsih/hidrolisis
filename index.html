<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔍 Cek Sifat Makanan Minuman Anda (Asam/Basa/Netral)</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#f7f7f7,#000,#f093fb);
      min-height: 100vh;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.9;
    }

    .identity {
      margin-top: 15px;
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .tab-btn {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .tab-btn.active {
      background: rgba(255,255,255,0.4);
    }

    section { display: none; }
    section.active { display: block; }

    .glass-card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
    }

    /* QUIZ FIX */
    .option-btn {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #fff;
      color: #111; /* FIX DISINI */
      cursor: pointer;
      margin: 5px 0;
      width: 100%;
      text-align: left;
    }

    .option-btn:hover {
      background: #eee;
    }

    .option-btn.correct {
      background: #4CAF50;
      color: white;
    }

    .option-btn.wrong {
      background: #f44336;
      color: white;
    }

  </style>
</head>

<body>

<div class="container">

<header>
  <h1>🔍 Cek Sifat Makanan Anda</h1>
  <p class="subtitle">Asam • Basa • Netral</p>

  <div class="identity">
    <b>Tugas</b><br>
    Nama: Arif Agung Setiawan<br>
    Kelas: X1 A<br>
    Absen: 10
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('quiz')">Quiz</button>
</div>

<section id="quiz" class="active">
  <div class="glass-card">
    <h2>Quiz</h2>
    <div id="quiz-content"></div>
    <div id="score"></div>
  </div>
</section>

</div>

<script>

const questions = [
  { q: "Kopi termasuk?", a: ["Asam","Basa","Netral"], c: 0 },
  { q: "Susu termasuk?", a: ["Asam","Basa","Netral"], c: 2 },
  { q: "Soda termasuk?", a: ["Asam","Basa","Netral"], c: 0 }
];

let index = 0;
let score = 0;

function showTab(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function loadQuestion(){
  let q = questions[index];
  document.getElementById("quiz-content").innerHTML = `
    <p>${q.q}</p>
    ${q.a.map((opt,i)=>`
      <button class="option-btn" onclick="answer(${i})">${opt}</button>
    `).join("")}
  `;
}

function answer(i){
  let q = questions[index];
  document.querySelectorAll(".option-btn").forEach((btn,idx)=>{
    btn.disabled = true;
    if(idx === q.c) btn.classList.add("correct");
    if(idx === i && i !== q.c) btn.classList.add("wrong");
  });

  if(i === q.c) score++;

  setTimeout(()=>{
    index++;
    if(index < questions.length){
      loadQuestion();
    } else {
      document.getElementById("quiz-content").innerHTML = "<h3>Quiz Selesai</h3>";
      document.getElementById("score").innerHTML = "Skor: "+score+"/"+questions.length;
    }
  },1000);
}

loadQuestion();

</script>

</body>
</html>
