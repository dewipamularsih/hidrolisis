<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔍 Cek Sifat Makanan Minuman Anda (Asam/Basa/Netral)</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f7f7f7 0%, #000000 50%, #f093fb 100%);
      min-height: 100vh;
    }

    .container { max-width: 1200px; margin: auto; padding: 1.5rem; }

    header {
      text-align: center;
      color: white;
      padding: 2rem 0;
    }

    h1 {
      font-size: 3rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 2rem 0;
    }

    .tab-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      color: white;
      cursor: pointer;
    }

    .tab-btn.active { background: rgba(255,255,255,0.4); }

    section { display: none; }
    section.active { display: block; }

    .glass-card {
      background: white;
      border-radius: 20px;
      padding: 2rem;
    }

    /* QUIZ FIX */
    .option-btn {
      padding: 1rem;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.9);
      color: #222; /* FIX */
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      text-align: left;
    }

    .option-btn:hover {
      background: #fff;
    }

    .option-btn.correct {
      background: green;
      color: white;
    }

    .option-btn.wrong {
      background: red;
      color: white;
    }

    .options { display: grid; gap: 10px; }

  </style>
</head>

<body>

<div class="container">

  <header>
    <h1>🔍 Cek Sifat Makanan</h1>
    <p>Tugas: Nama : Arif Agung Setiawan | Kelas: X1 A | Absen: 10</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('quiz')">Quiz</button>
  </div>

  <!-- QUIZ -->
  <section id="quiz" class="active">
    <div class="glass-card">
      <h2>Quiz</h2>
      <div id="quiz-content"></div>
    </div>
  </section>

</div>

<script>
const questions = [
  {q:"Kopi itu?", a:["Asam","Basa","Netral"], c:0},
  {q:"Susu itu?", a:["Asam","Basa","Netral"], c:2}
];

let current = 0;
let score = 0;

function showTab(tab){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

function startQuiz(){
  current=0; score=0;
  showQuestion();
}

function showQuestion(){
  let q=questions[current];
  document.getElementById("quiz-content").innerHTML = `
    <p>${q.q}</p>
    <div class="options">
      ${q.a.map((opt,i)=>`<button class="option-btn" onclick="check(${i})">${opt}</button>`).join("")}
    </div>
  `;
}

function check(i){
  let q=questions[current];
  document.querySelectorAll(".option-btn").forEach((btn,index)=>{
    btn.disabled=true;
    if(index==q.c) btn.classList.add("correct");
    if(index==i && i!=q.c) btn.classList.add("wrong");
  });

  if(i==q.c) score++;

  setTimeout(()=>{
    current++;
    if(current<questions.length) showQuestion();
    else finish();
  },1000);
}

function finish(){
  document.getElementById("quiz-content").innerHTML = `
    <h3>Skor: ${score}/${questions.length}</h3>
    <button onclick="startQuiz()">Ulang</button>
  `;
}

startQuiz();
</script>

</body>
</html>
